name: Deploy Frontend

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: farmu-frontend-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify build
        env:
          NEXT_PUBLIC_API_BASE_URL: https://farmu.gbsw.hs.kr
          NEXT_PUBLIC_APP_ENV: production
        run: npm run build

      - name: Package release
        run: |
          tar \
            --exclude=.git \
            --exclude=node_modules \
            --exclude=.next/cache \
            --exclude=docs \
            -czf /tmp/farmu-frontend-release.tar.gz .

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$EC2_SSH_KEY" > ~/.ssh/farmu-frontend
          chmod 600 ~/.ssh/farmu-frontend
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          scp -i ~/.ssh/farmu-frontend /tmp/farmu-frontend-release.tar.gz "$EC2_USER@$EC2_HOST:/tmp/farmu-frontend-release.tar.gz"

      - name: Deploy on EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/farmu-frontend "$EC2_USER@$EC2_HOST" 'bash -s' <<'REMOTE'
          set -euo pipefail

          export PATH=/usr/local/bin:/usr/bin:/usr/local/sbin:/usr/sbin:$PATH
          APP_DIR=/opt/farmu-frontend
          RELEASE=/tmp/farmu-frontend-release.tar.gz

          mkdir -p "$APP_DIR"
          find "$APP_DIR" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
          tar -xzf "$RELEASE" -C "$APP_DIR"
          rm -rf "$APP_DIR/docs"

          cd "$APP_DIR"
          npm ci
          NEXT_PUBLIC_API_BASE_URL=https://farmu.gbsw.hs.kr \
          NEXT_PUBLIC_APP_ENV=production \
          npm run build

          sudo systemctl restart farmu-frontend
          sleep 3
          systemctl is-active --quiet farmu-frontend
          curl -fsS http://127.0.0.1:3000/login >/dev/null
          REMOTE
